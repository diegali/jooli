<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOOLI Agenda</title>
<link rel="stylesheet" href="./css/style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d4af37">
<script type="module" src="./js/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/locales-all.global.min.js"></script>
</head>
<body>

<header>
  <img src="./logoB.png" class="logo">
  <span>JOOLI Catering - Agenda</span>
  <button id="darkBtn">🌙</button>
</header>

<div class="container" id="loginDiv">
  <h3>Login</h3>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Contraseña">
  <button id="loginBtn">Ingresar</button>
</div>

<div class="container" id="appDiv" style="display:none;">
  
  <div class="filter-bar" style="margin-bottom: 10px;">
    <button id="toggleStatsBtn" style="background: #3498db; color: white; width: 100%; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Ver Estadísticas</button>
  </div>

  <div id="statsContainer" style="display:none; background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #ddd;">
    <h3>Estadísticas del Mes</h3>
    <div class="stats" style="display: flex; justify-content: space-around; flex-wrap: wrap;">
      <div>Total: <span id="totalMes">0</span></div>
      <div>Señas: <span id="senasMes">0</span></div>
      <div>Saldo: <span id="saldoMes">0</span></div>
      <div>Eventos: <span id="eventosMes">0</span></div>
    </div>
  </div>

  <div class="filter-bar">
    <input type="month" id="monthFilter">
    <button id="showFormBtn" style="background: var(--gold); color: #111;">+ Nuevo Evento</button>
  </div>

  <div id="calendar" style="margin-bottom: 30px; background: white; padding: 10px; border-radius: 12px; color: #111;"></div>

  <hr>

  <div id="eventFormContainer" style="display:none; background: rgba(0,0,0,0.05); padding: 20px; border-radius: 15px; margin-bottom: 20px;">
    <h3 id="formTitle">Nuevo Evento</h3>
    <div class="form-grid">
      <div class="form-group"><label>Fecha</label><input type="date" id="date"></div>
      <div class="form-group"><label>Tipo</label>
        <select id="type">
          <option>Catering Completo</option>
          <option>Solo Finger Food</option>
          <option>Mesa Dulce</option>
          <option>Personal de Servicio</option>
        </select>
      </div>
      <div class="form-group"><label>Cliente</label><input type="text" id="client"></div>
      <div class="form-group"><label>CUIT/DNI</label><input type="text" id="cuit"></div>
      <div class="form-group"><label>Lugar</label><input type="text" id="place"></div>
      <div class="form-group"><label>Invitados</label><input type="number" id="guests"></div>
      <div class="form-group"><label>Total $</label><input type="number" id="total"></div>
      <div class="form-group"><label>Seña $</label><input type="number" id="deposit"></div>
      <div class="form-group"><label>Estado</label>
        <select id="status">
          <option>Presupuestado</option>
          <option>Seña pagada</option>
          <option>Confirmado</option>
          <option>Realizado</option>
          <option>Cancelado</option>
        </select>
      </div>
      <div class="form-group"><label>¿Pagado?</label>
        <select id="paid">
          <option value="false">No</option>
          <option value="true">Sí</option>
        </select>
      </div>
      <div class="form-group"><label>Nro Factura</label><input type="text" id="invoiceNumber"></div>
    </div>
    <div class="form-group"><label>Notas</label><textarea id="notes"></textarea></div>
    <div style="margin-top:10px;">
      <button id="addBtn">Guardar Evento</button>
      <button id="updateBtn" style="display:none;">Actualizar Evento</button>
      <button id="cancelFormBtn" style="background:#666;">Cancelar</button>
    </div>
  </div>

  <h3>Próximos Eventos</h3>
  <div id="eventsList"></div>
</div>

</body>
</html>
